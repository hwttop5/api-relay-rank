name: api-relay-rank

services:
  app:
    image: api-relay-rank:local
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["sh", "deploy/start-app.sh"]
    working_dir: /app
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      PORT: "3000"
      APP_DOMAIN: ${APP_DOMAIN}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      APP_DATA_DIR: ${APP_DATA_DIR}
      LIVE_AUTH_PROBE_DIR: ${LIVE_AUTH_PROBE_DIR}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS}
      AUDIT_RETENTION_MAX_PER_TARGET: ${AUDIT_RETENTION_MAX_PER_TARGET}
      API_RELAY_SCRAPE_EMAIL: ${API_RELAY_SCRAPE_EMAIL}
      API_RELAY_SCRAPE_PASSWORD: ${API_RELAY_SCRAPE_PASSWORD}
      API_RELAY_SCRAPE_BOSSCLAW_EMAIL: ${API_RELAY_SCRAPE_BOSSCLAW_EMAIL}
      API_RELAY_SCRAPE_BOSSCLAW_PASSWORD: ${API_RELAY_SCRAPE_BOSSCLAW_PASSWORD}
    volumes:
      - /srv/api-relay-rank/data:/runtime/data
      - /srv/api-relay-rank/probes:/runtime/tabbit-audit-profile
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      default: {}
      shared_proxy:
        aliases:
          - api-relay-rank-app

  scheduler:
    image: api-relay-rank:local
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["sh", "deploy/start-scheduler.sh"]
    working_dir: /app
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      APP_DOMAIN: ${APP_DOMAIN}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      APP_DATA_DIR: ${APP_DATA_DIR}
      LIVE_AUTH_PROBE_DIR: ${LIVE_AUTH_PROBE_DIR}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS}
      AUDIT_RETENTION_MAX_PER_TARGET: ${AUDIT_RETENTION_MAX_PER_TARGET}
      API_RELAY_SCRAPE_EMAIL: ${API_RELAY_SCRAPE_EMAIL}
      API_RELAY_SCRAPE_PASSWORD: ${API_RELAY_SCRAPE_PASSWORD}
      API_RELAY_SCRAPE_BOSSCLAW_EMAIL: ${API_RELAY_SCRAPE_BOSSCLAW_EMAIL}
      API_RELAY_SCRAPE_BOSSCLAW_PASSWORD: ${API_RELAY_SCRAPE_BOSSCLAW_PASSWORD}
    volumes:
      - /srv/api-relay-rank/data:/runtime/data
      - /srv/api-relay-rank/probes:/runtime/tabbit-audit-profile

networks:
  shared_proxy:
    external: true
