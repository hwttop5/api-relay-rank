name: api-relay-rank

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - /srv/api-relay-rank/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    image: api-relay-rank:local
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_BAIDU_TONGJI_ID: ${NEXT_PUBLIC_BAIDU_TONGJI_ID:-}
    restart: unless-stopped
    command: ["sh", "deploy/start-app.sh"]
    working_dir: /app
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      PORT: "3000"
      APP_DOMAIN: ${APP_DOMAIN}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_BAIDU_TONGJI_ID: ${NEXT_PUBLIC_BAIDU_TONGJI_ID:-}
      PAGE_VIEW_TRACKING_ENABLED: ${PAGE_VIEW_TRACKING_ENABLED:-1}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SITE_DATA_SOURCE: ${SITE_DATA_SOURCE:-postgres}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SITE_DATA_ALLOW_FILE_FALLBACK: ${SITE_DATA_ALLOW_FILE_FALLBACK:-0}
      SITE_DATA_MERGE_POSTGRES_BASE: ${SITE_DATA_MERGE_POSTGRES_BASE:-1}
      APP_DATA_DIR: ${APP_DATA_DIR}
      LIVE_AUTH_PROBE_DIR: ${LIVE_AUTH_PROBE_DIR}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS}
      AUDIT_RETENTION_MAX_PER_TARGET: ${AUDIT_RETENTION_MAX_PER_TARGET}
      API_RELAY_SCRAPE_EMAIL: ${API_RELAY_SCRAPE_EMAIL}
      API_RELAY_SCRAPE_PASSWORD: ${API_RELAY_SCRAPE_PASSWORD}
      API_RELAY_SCRAPE_BOSSCLAW_EMAIL: ${API_RELAY_SCRAPE_BOSSCLAW_EMAIL}
      API_RELAY_SCRAPE_BOSSCLAW_PASSWORD: ${API_RELAY_SCRAPE_BOSSCLAW_PASSWORD}
    volumes:
      - /srv/api-relay-rank/data:/runtime/data
      - /srv/api-relay-rank/probes:/runtime/tabbit-audit-profile
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      default: {}
      shared_proxy:
        aliases:
          - api-relay-rank-app

  scheduler:
    image: api-relay-rank:local
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_BAIDU_TONGJI_ID: ${NEXT_PUBLIC_BAIDU_TONGJI_ID:-}
    restart: unless-stopped
    command: ["sh", "deploy/start-scheduler.sh"]
    working_dir: /app
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      APP_DOMAIN: ${APP_DOMAIN}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_BAIDU_TONGJI_ID: ${NEXT_PUBLIC_BAIDU_TONGJI_ID:-}
      PAGE_VIEW_TRACKING_ENABLED: ${PAGE_VIEW_TRACKING_ENABLED:-1}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SITE_DATA_SOURCE: ${SITE_DATA_SOURCE:-postgres}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SITE_DATA_ALLOW_FILE_FALLBACK: ${SITE_DATA_ALLOW_FILE_FALLBACK:-0}
      SITE_DATA_MERGE_POSTGRES_BASE: ${SITE_DATA_MERGE_POSTGRES_BASE:-1}
      LOG_INBOX_DIR: ${LOG_INBOX_DIR}
      LOG_ARCHIVE_DIR: ${LOG_ARCHIVE_DIR}
      APP_DATA_DIR: ${APP_DATA_DIR}
      LIVE_AUTH_PROBE_DIR: ${LIVE_AUTH_PROBE_DIR}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS}
      AUDIT_RETENTION_MAX_PER_TARGET: ${AUDIT_RETENTION_MAX_PER_TARGET}
      API_RELAY_SCRAPE_EMAIL: ${API_RELAY_SCRAPE_EMAIL}
      API_RELAY_SCRAPE_PASSWORD: ${API_RELAY_SCRAPE_PASSWORD}
      API_RELAY_SCRAPE_BOSSCLAW_EMAIL: ${API_RELAY_SCRAPE_BOSSCLAW_EMAIL}
      API_RELAY_SCRAPE_BOSSCLAW_PASSWORD: ${API_RELAY_SCRAPE_BOSSCLAW_PASSWORD}
    volumes:
      - /srv/api-relay-rank/data:/runtime/data
      - /srv/api-relay-rank/probes:/runtime/tabbit-audit-profile
      - /srv/api-relay-rank/log-inbox:/runtime/log-inbox
      - /srv/api-relay-rank/log-archive:/runtime/log-archive
    depends_on:
      postgres:
        condition: service_healthy

networks:
  shared_proxy:
    external: true
