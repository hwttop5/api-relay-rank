name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-vps-api-relay-rank-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p 22 "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          rsync -az --delete --delay-updates \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.env' \
            --exclude 'deploy/.env' \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            ./ "$VPS_USER@$VPS_HOST:/opt/stacks/api-relay-rank/"

      - name: Configure Baidu Tongji on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          BAIDU_TONGJI_ID: ${{ secrets.BAIDU_TONGJI_ID }}
        run: |
          set -euo pipefail
          test -n "$BAIDU_TONGJI_ID"
          encoded_id="$(printf '%s' "$BAIDU_TONGJI_ID" | base64 -w 0)"
          ssh -i ~/.ssh/deploy_key -p 22 "$VPS_USER@$VPS_HOST" \
            "BAIDU_TONGJI_ID_B64='$encoded_id' sh -s" <<'REMOTE_SCRIPT'
          set -eu
          env_file="/opt/stacks/api-relay-rank/deploy/.env"
          baidu_tongji_id="$(printf '%s' "$BAIDU_TONGJI_ID_B64" | base64 -d)"
          mkdir -p "$(dirname "$env_file")"
          touch "$env_file"
          tmp_file="$(mktemp)"
          awk -v value="$baidu_tongji_id" '
            BEGIN { found = 0 }
            /^NEXT_PUBLIC_BAIDU_TONGJI_ID=/ {
              print "NEXT_PUBLIC_BAIDU_TONGJI_ID=" value
              found = 1
              next
            }
            { print }
            END {
              if (!found) {
                print "NEXT_PUBLIC_BAIDU_TONGJI_ID=" value
              }
            }
          ' "$env_file" > "$tmp_file"
          cat "$tmp_file" > "$env_file"
          rm -f "$tmp_file"
          echo "Configured NEXT_PUBLIC_BAIDU_TONGJI_ID in $env_file"
          REMOTE_SCRIPT

      - name: Configure owner announcement token on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          OWNER_ANNOUNCEMENT_GITHUB_TOKEN: ${{ secrets.OWNER_ANNOUNCEMENT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${OWNER_ANNOUNCEMENT_GITHUB_TOKEN:-}" ]; then
            echo "OWNER_ANNOUNCEMENT_GITHUB_TOKEN not configured; keep existing GITHUB_TOKEN value."
            exit 0
          fi
          encoded_token="$(printf '%s' "$OWNER_ANNOUNCEMENT_GITHUB_TOKEN" | base64 -w 0)"
          ssh -i ~/.ssh/deploy_key -p 22 "$VPS_USER@$VPS_HOST" \
            "OWNER_ANNOUNCEMENT_GITHUB_TOKEN_B64='$encoded_token' sh -s" <<'REMOTE_SCRIPT'
          set -eu
          env_file="/opt/stacks/api-relay-rank/deploy/.env"
          github_token="$(printf '%s' "$OWNER_ANNOUNCEMENT_GITHUB_TOKEN_B64" | base64 -d)"
          mkdir -p "$(dirname "$env_file")"
          touch "$env_file"
          tmp_file="$(mktemp)"
          awk -v value="$github_token" '
            BEGIN { found = 0 }
            /^GITHUB_TOKEN=/ {
              print "GITHUB_TOKEN=" value
              found = 1
              next
            }
            { print }
            END {
              if (!found) {
                print "GITHUB_TOKEN=" value
              }
            }
          ' "$env_file" > "$tmp_file"
          cat "$tmp_file" > "$env_file"
          rm -f "$tmp_file"
          echo "Configured GITHUB_TOKEN in $env_file"
          REMOTE_SCRIPT

      - name: Configure PostgreSQL and log sync on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$POSTGRES_PASSWORD"
          encoded_password="$(printf '%s' "$POSTGRES_PASSWORD" | base64 -w 0)"
          ssh -i ~/.ssh/deploy_key -p 22 "$VPS_USER@$VPS_HOST" \
            "POSTGRES_PASSWORD_B64='$encoded_password' sh -s" <<'REMOTE_SCRIPT'
          set -eu
          env_file="/opt/stacks/api-relay-rank/deploy/.env"
          postgres_password="$(printf '%s' "$POSTGRES_PASSWORD_B64" | base64 -d)"

          mkdir -p \
            /srv/api-relay-rank/data \
            /srv/api-relay-rank/probes \
            /srv/api-relay-rank/postgres \
            /srv/api-relay-rank/log-inbox \
            /srv/api-relay-rank/log-archive \
            "$(dirname "$env_file")"
          touch "$env_file"
          chmod 600 "$env_file" || true

          set_env_var() {
            key="$1"
            value="$2"
            tmp_file="$(mktemp)"
            awk -v key="$key" -v value="$value" '
              BEGIN { found = 0 }
              $0 ~ "^" key "=" {
                print key "=" value
                found = 1
                next
              }
              { print }
              END {
                if (!found) {
                  print key "=" value
                }
              }
            ' "$env_file" > "$tmp_file"
            cat "$tmp_file" > "$env_file"
            rm -f "$tmp_file"
          }

          set_env_var POSTGRES_DB api_relay_rank
          set_env_var POSTGRES_USER api_relay_rank
          set_env_var POSTGRES_PASSWORD "$postgres_password"
          set_env_var SITE_DATA_SOURCE postgres
          set_env_var SITE_DATA_ALLOW_FILE_FALLBACK 0
          set_env_var SITE_DATA_MERGE_POSTGRES_BASE 1
          set_env_var LOG_INBOX_DIR /runtime/log-inbox
          set_env_var LOG_ARCHIVE_DIR /runtime/log-archive

          echo "Configured PostgreSQL and log sync environment in $env_file"
          REMOTE_SCRIPT

      - name: Restart Docker stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p 22 "$VPS_USER@$VPS_HOST" \
            "/opt/stacks/deploy-hooks/deploy-stack.sh api-relay-rank"

      - name: Verify owner announcement sync
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          set +e
          remote_output="$(
            ssh -i ~/.ssh/deploy_key -p 22 "$VPS_USER@$VPS_HOST" <<'REMOTE_SCRIPT'
          set -eu
          cd /opt/stacks/api-relay-rank
          if docker compose --env-file deploy/.env -f deploy/docker-compose.yml ps scheduler >/dev/null 2>&1; then
            docker compose --env-file deploy/.env -f deploy/docker-compose.yml exec -T scheduler python scripts/refresh_owner_announcement.py
          else
            python scripts/refresh_owner_announcement.py
          fi
          REMOTE_SCRIPT
          )"
          remote_status=$?
          set -e

          {
            echo "## Owner announcement sync"
            echo
            echo '```json'
            printf '%s\n' "$remote_output"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$remote_status" -ne 0 ]; then
            echo "::warning::Owner announcement sync failed. The site deployment continues, but /api/contact-ad may serve the previous cache or empty state."
            printf '%s\n' "$remote_output"
            exit 0
          fi

          if printf '%s' "$remote_output" | grep -q '"ok": false'; then
            echo "::warning::Owner announcement sync reported ok=false. Check GITHUB_TOKEN, GitHub rate limits, and data/_owner_announcement/status.json."
            exit 0
          fi

          echo "Owner announcement sync verification completed."
