name: Refresh Site Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-site-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Node.js dependencies
        run: npm ci

      - name: Refresh public announcements and pricing snapshots
        run: python scripts/fetch_public_content.py --announcements --multiplier-snapshots --skip-build

      - name: Capture live auth probes
        shell: bash
        env:
          API_RELAY_SCRAPE_EMAIL: ${{ secrets.API_RELAY_SCRAPE_EMAIL }}
          API_RELAY_SCRAPE_PASSWORD: ${{ secrets.API_RELAY_SCRAPE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${API_RELAY_SCRAPE_EMAIL}" || -z "${API_RELAY_SCRAPE_PASSWORD}" ]]; then
            echo "::error::Missing API_RELAY_SCRAPE_EMAIL/API_RELAY_SCRAPE_PASSWORD GitHub Actions secrets."
            exit 1
          fi
          export API_RELAY_CAPTURED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python scripts/scrape_missing_announcements.py --all-stations --write-probes | tee "$RUNNER_TEMP/live-auth-capture-summary.json"

      - name: Rebuild site data
        run: python scripts/build_site_data.py

      - name: Validate refreshed data
        shell: bash
        run: python scripts/validate_refresh_outputs.py --scrape-report "$RUNNER_TEMP/live-auth-capture-summary.json"

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- data/site-data.json data/_public_fetch; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit refreshed data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/site-data.json data/_public_fetch
          git commit -m "chore(data): refresh site data snapshots"

      - name: Push refreshed data
        if: steps.changes.outputs.changed == 'true'
        run: git push origin HEAD:master
