name: api-relay-rank-local-db

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-api_relay_rank}
      POSTGRES_USER: ${POSTGRES_USER:-api_relay_rank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-api_relay_rank_local_password}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - api_relay_rank_local_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-api_relay_rank} -d ${POSTGRES_DB:-api_relay_rank}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  api_relay_rank_local_postgres:
