<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#101820" />
    <title>离线中 | AI 中转站监视站</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101820;
        --panel: #171b20;
        --text: #eef4ef;
        --muted: #b9c8c2;
        --border: rgba(32, 211, 162, 0.26);
        --accent: #20d3a2;
        --accent-2: #f0b95a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at 50% 10%, rgba(32, 211, 162, 0.12), transparent 32rem),
          var(--bg);
        color: var(--text);
        display: flex;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        justify-content: center;
        line-height: 1.6;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
        max-width: 560px;
        padding: 36px;
        width: 100%;
      }

      svg {
        display: block;
        height: 64px;
        margin-bottom: 28px;
        width: 64px;
      }

      h1 {
        font-size: clamp(28px, 5vw, 40px);
        letter-spacing: 0;
        line-height: 1.16;
        margin: 0;
      }

      p {
        color: var(--muted);
        font-size: 16px;
        margin: 16px 0 0;
      }

      a {
        align-items: center;
        background: var(--accent);
        border-radius: 999px;
        color: #07100d;
        display: inline-flex;
        font-size: 14px;
        font-weight: 700;
        gap: 8px;
        margin-top: 28px;
        min-height: 44px;
        padding: 0 18px;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid rgba(240, 185, 90, 0.72);
        outline-offset: 3px;
      }

      @media (max-width: 480px) {
        main {
          padding: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect width="64" height="64" rx="14" fill="#101820" />
        <rect x="4" y="4" width="56" height="56" rx="14" fill="none" stroke="#20d3a2" stroke-opacity="0.34" stroke-width="1.25" />
        <circle cx="32" cy="35" r="20" fill="#080d13" fill-opacity="0.9" />
        <circle cx="32" cy="35" r="20" fill="none" stroke="#20d3a2" stroke-width="3.2" />
        <circle cx="32" cy="35" r="12" fill="none" stroke="#7adfbc" stroke-width="3" opacity="0.96" />
        <path d="M32 35L50 25A20 20 0 0 1 52 38Z" fill="#20d3a2" fill-opacity="0.22" />
        <path d="M32 35L50 25" fill="none" stroke="#20d3a2" stroke-width="4" stroke-linecap="round" />
        <circle cx="32" cy="35" r="4.6" fill="#f0b95a" stroke="#101820" stroke-opacity="0.96" stroke-width="1.8" />
        <path d="M20 16H44" fill="none" stroke="#f0b95a" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <h1>当前处于离线状态</h1>
      <p>AI 中转站监视站需要网络连接来读取最新排名、审计与站点数据。请检查网络后返回综合排名页。</p>
      <a href="/ranking">返回综合排名</a>
    </main>
  </body>
</html>
