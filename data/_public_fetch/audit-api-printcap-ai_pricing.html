  <script nonce="d9tFJK3TcJRUPvUwnHv2qg==">window.__APP_CONFIG__={"registration_enabled":true,"email_verify_enabled":true,"registration_email_suffix_whitelist":[],"promo_code_enabled":false,"password_reset_enabled":false,"invitation_code_enabled":false,"totp_enabled":true,"login_agreement_enabled":false,"login_agreement_mode":"checkbox","login_agreement_updated_at":"2030-05-14","login_agreement_revision":"1c1e604683534090","login_agreement_documents":[{"id":"terms","title":"PrintCap 服务条款","content_md":"## 服务说明\n\nPrintCap 提供 AI API 中转与用量管理服务。用户可以创建 API Key，通过 OpenAI 兼容接口或 Claude 兼容接口调用支持的 AI 模型。\n\n## 账户与 API Key\n\n用户需要妥善保管账户、密码和 API Key。任何通过用户 API Key 发起的请求，都视为该用户本人或其授权人员的操作。\n\n## 费用与交付\n\nPrintCap 提供余额按量计费和订阅套餐。支付成功后，余额或订阅权益会自动发放到用户账户。数字服务一经交付即开始可用。\n\n## 使用限制\n\n用户不得使用 PrintCap 从事违法、欺诈、赌博、成人内容、恶意软件、垃圾信息、侵犯他人权利或规避平台安全策略的活动。\n\n## 服务可用性\n\nPrintCap 会尽力保持服务稳定，但上游模型、网络、账号容量、风控策略或维护操作可能影响请求成功率和延迟。\n\n## 联系方式\n\nTelegram：@greyireland\n\nX：https://x.com/printcap_ai"},{"id":"privacy","title":"PrintCap 隐私政策","content_md":"## 我们收集的信息\n\n为了提供服务，PrintCap 可能收集账户邮箱、登录信息、API Key 元数据、订单信息、支付状态、请求用量、错误日志和必要的安全审计记录。\n\n## 信息用途\n\n这些信息用于账户登录、支付交付、用量统计、账单核算、风控审计、故障排查和客户支持。\n\n## API 请求内容\n\nPrintCap 会转发用户发起的 API 请求到对应上游模型服务。我们不会主动出售用户请求内容。为了排查故障和控制滥用，系统可能保留必要的请求元数据和错误摘要。\n\n## 支付信息\n\n加密货币、支付宝、微信或其他支付信息由对应支付服务商处理。PrintCap 保存订单号、金额、状态和必要的对账信息，不保存完整支付凭证。\n\n## 数据安全\n\nPrintCap 使用访问控制、密钥脱敏、日志限制和权限隔离保护数据。用户应自行保护 API Key，不要在公开仓库、客户端前端或聊天记录中泄露。\n\n## 联系方式\n\n隐私相关问题可通过 Telegram @greyireland 联系我们。"},{"id":"refund","title":"PrintCap 退款政策","content_md":"## 余额充值\n\n余额充值属于数字服务额度。若充值后未使用，可联系支持申请人工退款；已消耗部分不支持退款。\n\n## 订阅套餐\n\n订阅套餐支付后会立即发放权益。若套餐未明显使用，可在合理时间内联系支持申请人工处理；已大量使用、触发限额或存在滥用行为的订单不支持退款。\n\n## 异常订单\n\n重复支付、到账失败、金额异常或系统未自动发放的订单，请提供订单号、支付时间、支付金额和账户邮箱，我们会优先核查并补发或退款。\n\n## 退款方式\n\n退款通常按原支付方式或双方确认的方式处理。不同支付服务商的到账时间可能不同。\n\n## 滥用限制\n\n存在欺诈、恶意测试、违反使用政策或规避风控行为的账户，PrintCap 可拒绝退款并限制账户继续使用。"},{"id":"contact","title":"联系 PrintCap","content_md":"## 客服支持\n\nTelegram：@greyireland\n\nX：https://x.com/printcap_ai\n\n官网：https://printcap.ai\n\n文档：https://printcap.ai/docs/\n\n## 提交问题时请提供\n\n- 账户邮箱\n- 订单号或 API Key 后 6 位\n- 问题发生时间\n- 请求模型和接口路径\n- 错误信息或截图\n\n请不要发送完整 API Key、密码或支付私钥。"}],"turnstile_enabled":true,"turnstile_site_key":"0x4AAAAAADCUBUCj5NqwjxQH","site_name":"PrintCap","site_logo":"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAgAAAAIACAYAAAD0eNT6AAAABmJLR0QA/wD/AP+gvaeTAAAgAElEQVR4nOydd5gcV5X23+o4eUaaJGmUkyVLlmw5yhEnbIMJNhgMmJx2AcOS1izw7S5hyQvY2CYZTDILTuCcsI2jnBQsWbKyRmE0o5EmT/dMx/v90dOhum5V3UpdXd3n9zyWq2+duvdMz3S/5956q0oCYSuMsfp4fHy+n/kWpCEtYBJmSYy1SxJaGWOtkKRWALUAWjJHSAGANbqZM0EQROmRxgCWnHoxDGACjA1IkjTAGI4xSTomMfT4wLpTUnpfKNTQLUlSxM2MKw3J7QS8CmOsIZGYWAGw1QBOQJqtAqTlkNDudm4EQRAVCcNRgG2DT9oCYDMgbQ4Ga1+jwsAcVAAIEolEZgUC0lmSlD4baelkSDgNQNDtvAiCIKqcFIAdgLQeEnuWsfRz4XDjVreT8gJUAKjA2GBzPF5zkcTYpZKESxkw2+2cCIIgCCEOguFhJkkPhUKRf0hS+5jbCZUjVAAUEI1GZwd8uApIvw2SdBaAgNs5EQRBEJZIQJKeRRr3JtO4o66ursfthMqFqi8AWCQyM+GX3gmwd0PCWgA+t3MiCIIgHCENxp4DfLcHk+k7pYaGPrcTcpOqLAAYY75kLHIBJOkTDLgCNNMnCIKoNtKQ8ARj0q9Codq/SZKU1D+ksqiqAiAajc7x+9knfMBHGDDL7XwIgiAI95GAnjTw21RK+lVdXd0ht/MpFVVRAMTj4yeC+b4AsKtBzn2CIAiCT0IC/s4k6X9DoboX3U7GaSq6AEhORi5L+6Qvg7Hz3c6FIAiC8BCS9LiUTv8wWNPwiNupOEVFFgCJxMTZLJX6NiTpPLdzIQiCIDzNC2mG79TU1N/ndiJ2U1EFAAk/QRAE4QiS9KQk4evBYN3zbqdiFxVRAESj0TkBP/4HYNegQn4mgiAIovxgwP3ptO+ztbW1+9zOxSqeFsvMg3eiX5aA6wDUuJ0PQRAEURXEIbFfBIMTX/fyXQY9WwDEYtErfWA/o8v5CIIgCDeQgENp4DPhcP09budiBs8VAGx8fEYyKN3AgKvczoUgCIIgGHB/KiX9q9fuIeCZAoAxJiUS0Y+C4YcAWtzOhyAIgiAKGIKEL4VC9b91OxFRPFEAMDbWnoz7bmHAW93OhSAIgiDUYMAjoQT7kBeeM1D2BUBicvxiSNLv6Fw/QRAE4Qkk9PvS+Eigpv4Bt1PRomyffMcYC8Xj49czSXqExJ8gCILwDAwdaQn3xePj/8sYK9vbz5flCkAkEpkVDOAOAGe6nQtBEARBmIbh2WAK75Lq63vdTqWYsisAEomJs9Pp9O0SMNPtXAiCIAjCMhL6pVT66mBt45Nup1JIWZ0CiMcj/8rS6SdI/AmCIIiKgaGD+XwPx+ORT7idSiFlUQAwxqRYLPLfYLgZ9LhegiAIovIIgeGX8fj49YyxstBe108BMMZqEvHIrYB0tdu5EARBEITTSMDdgVDdNZIkTbich3swNtqaiPvvB3CGm3kQBEEQRIl5PhhKXC5JLUNuJeBaAcDGxzsTQelRAKvcyoEgCIIgXGRbMImL3LpCwJUCgEUiMxMBPAZghRvjEwRBEER5IO1IpnCRG88RKHkBMDExscDvSz8OYEGpxyYIgiCIMmRfKu27sLa2dl8
